name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Validate tag and project version
        shell: bash
        run: |
          version="$(sed -n 's/^missionRecorderVersion=//p' gradle.properties)"
          test -n "$version"
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            test "v$version" = "$GITHUB_REF_NAME"
          fi
          grep -q "^## \[$version\]" CHANGELOG.md

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Run clean checks and build
        run: ./gradlew clean check build --stacktrace

  package:
    needs: verify
    name: Package ${{ matrix.id }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows-x64
            os: windows-latest
            wrapper: ./gradlew.bat
            tasks: ":desktop-app:packageReleaseMsi :desktop-app:packageReleaseExe"
            paths: |
              desktop-app/build/compose/binaries/main-release/msi/*.msi
              desktop-app/build/compose/binaries/main-release/exe/*.exe
          - id: macos-x64
            os: macos-15-intel
            wrapper: ./gradlew
            tasks: ":desktop-app:packageReleaseDmg"
            dmg_suffix: macos-x64
            paths: desktop-app/build/compose/binaries/main-release/dmg/*.dmg
          - id: macos-arm64
            os: macos-latest
            wrapper: ./gradlew
            tasks: ":desktop-app:packageReleaseDmg"
            dmg_suffix: macos-arm64
            paths: desktop-app/build/compose/binaries/main-release/dmg/*.dmg
          - id: linux-x64
            os: ubuntu-latest
            wrapper: ./gradlew
            tasks: ":desktop-app:packageReleaseDeb :app:distZip"
            paths: |
              desktop-app/build/compose/binaries/main-release/deb/*.deb
              app/build/distributions/*.zip
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Build release artifacts
        run: ${{ matrix.wrapper }} ${{ matrix.tasks }} --stacktrace

      - name: Print native packaging diagnostics
        if: failure() && runner.os == 'macOS'
        shell: bash
        run: |
          if [[ -d desktop-app/build/compose/logs ]]; then
            find desktop-app/build/compose/logs -type f -print -exec cat {} \;
          fi

      - name: Add macOS architecture to DMG name
        if: runner.os == 'macOS'
        shell: bash
        run: |
          dmg="$(find desktop-app/build/compose/binaries/main-release/dmg -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$dmg"
          mv "$dmg" "${dmg%.dmg}-${{ matrix.dmg_suffix }}.dmg"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mission-recorder-${{ matrix.id }}
          path: ${{ matrix.paths }}
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: package
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: mission-recorder-*
          path: release-assets
          merge-multiple: true

      - name: Validate assets and prepare release notes
        shell: bash
        run: |
          test "$(find release-assets -maxdepth 1 -name '*.msi' | wc -l)" -eq 1
          test "$(find release-assets -maxdepth 1 -name '*.exe' | wc -l)" -eq 1
          test "$(find release-assets -maxdepth 1 -name '*.dmg' | wc -l)" -eq 2
          test "$(find release-assets -maxdepth 1 -name '*.deb' | wc -l)" -eq 1
          test "$(find release-assets -maxdepth 1 -name '*.zip' | wc -l)" -eq 1

          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            BEGIN { heading = "## [" version "]" }
            index($0, heading) == 1 { printing = 1 }
            printing && index($0, "## [") == 1 && index($0, heading) != 1 { exit }
            printing { print }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md

          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release-assets/*
          --verify-tag
          --title "Mission Recorder ${GITHUB_REF_NAME#v}"
          --notes-file release-notes.md
